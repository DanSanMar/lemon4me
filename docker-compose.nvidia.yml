services:
  lemonade:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - 'NVIDIA_VISIBLE_DEVICES=all'
      - 'NVIDIA_DRIVER_CAPABILITIES=compute,utility'
      - 'LEMONADE_LLAMACPP_BACKEND=cuda'